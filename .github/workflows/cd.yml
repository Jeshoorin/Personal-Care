name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-web-vercel:
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Check Vercel secrets
        id: check_vercel
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment enabled."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment skipped (missing one or more secrets)."
          fi

      - name: Checkout
        if: ${{ steps.check_vercel.outputs.ready == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ steps.check_vercel.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.check_vercel.outputs.ready == 'true' }}
        run: npm ci

      - name: Build shared + web
        if: ${{ steps.check_vercel.outputs.ready == 'true' }}
        run: npm run build --workspace @personal-care/shared-types && npm run build --workspace @personal-care/web

      - name: Deploy to Vercel (Production)
        if: ${{ steps.check_vercel.outputs.ready == 'true' }}
        run: |
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api-render:
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Check Render deploy hook
        id: check_render
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Render deployment enabled."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Render deployment skipped (missing RENDER_DEPLOY_HOOK_URL)."
          fi

      - name: Trigger Render deploy hook
        if: ${{ steps.check_render.outputs.ready == 'true' }}
        run: curl --fail --show-error --silent -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
