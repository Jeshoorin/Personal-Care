name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-web-vercel:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared + web
        run: npm run build --workspace @personal-care/shared-types && npm run build --workspace @personal-care/web

      - name: Deploy to Vercel (Production)
        run: |
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api-render:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
    environment: production

    steps:
      - name: Trigger Render deploy hook
        run: curl --fail --show-error --silent -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
