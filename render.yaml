services:
  - type: web
    name: personal-care-api
    env: node
    plan: free
    autoDeploy: false
    healthCheckPath: /health
    buildCommand: npm ci && npm run build --workspace @personal-care/shared-types && npm run build --workspace @personal-care/api
    startCommand: npm run start --workspace @personal-care/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
